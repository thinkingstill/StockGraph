        @keyframes ai-pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .ai-loading-hint { color:var(--muted); font-size:12px; }
        .ai-thinking { display:flex; align-items:center; gap:8px; padding:20px; color:var(--muted); font-size:14px; }
        .ai-thinking-dots { display:flex; gap:4px; }
        .ai-thinking-dots span { width:6px; height:6px; background:var(--accent); border-radius:50%; animation:ai-bounce 1.4s ease-in-out infinite; }
        .ai-thinking-dots span:nth-child(2) { animation-delay:0.2s; }
        .ai-thinking-dots span:nth-child(3) { animation-delay:0.4s; }
        @keyframes ai-bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }
        .ai-btn-loading { position:relative; pointer-events:none; }
        .ai-btn-loading::after { content:''; position:absolute; inset:0; background:rgba(255,255,255,0.3); border-radius:inherit; }
        .ai-status { font-size:12px; color:var(--muted); margin-top:4px; }
        @media (max-width:1100px) { .ai-layout { grid-template-columns:1fr; } .ai-left { position:static; } .ai-context { grid-template-columns:1fr; } }
      </style>`;

      root.innerHTML = styles + `
        <h3 style="margin:0 0 16px;">AI 智能分析</h3>
        <div class="ai-layout">
          <div class="ai-left">
            <div class="ai-card">
              <h4>API 配置</h4>
              <div class="ai-config-grid">
                <div><label>Base URL</label><input id="ai-baseurl" placeholder="https://api.openai.com/v1" value="${escapeHtml(savedBaseUrl)}"></div>
                <div><label>API Key</label><input id="ai-key" type="password" placeholder="sk-..." value="${escapeHtml(savedKey)}"></div>
                <div><label>模型</label><input id="ai-model" placeholder="gpt-4o-mini" value="${escapeHtml(savedModel)}"></div>
                <div><button class="primary" id="ai-save-config" style="width:100%;">保存配置</button></div>
              </div>
            </div>
            <div class="ai-card">
              <h4>选择股票</h4>
              <select id="ai-stock-select" class="ai-stock-select">
                <option value="">-- 请选择 --</option>
                ${stockCodes.map(c => {
                  const name = stockNames[c] || '';
                  return `<option value="${escapeHtml(c)}">${escapeHtml(c)}${name ? ' - ' + escapeHtml(name) : ''}</option>`;
                }).join('')}
              </select>
            </div>
            <div class="ai-card ai-prompt-card">
              <h4>分析提示词</h4>
              <textarea id="ai-prompt" placeholder="可自定义分析提示词，留空使用默认提示词">请从资金面（龙虎榜数据）、消息面（近期新闻）两个维度，综合分析该股票的近期走势和市场关注度，给出简要的投资参考意见。</textarea>
              <div class="ai-actions">
                <button class="primary" id="ai-analyze-btn" style="flex:1;">开始分析</button>
                <button id="ai-stop-btn" style="display:none;">停止</button>
              </div>
            </div>
          </div>
          <div class="ai-right">
            <div id="ai-context-area"></div>
            <div id="ai-result-area"></div>
            <div id="ai-status" class="ai-status"></div>
          </div>
        </div>
      `;

      // 保存配置
      document.getElementById('ai-save-config').addEventListener('click', () => {
        localStorage.setItem('ai_base_url', document.getElementById('ai-baseurl').value.trim());
        localStorage.setItem('ai_api_key', document.getElementById('ai-key').value.trim());
        localStorage.setItem('ai_model', document.getElementById('ai-model').value.trim());
        document.getElementById('ai-status').textContent = '配置已保存到本地浏览器';
        setTimeout(() => { document.getElementById('ai-status').textContent = ''; }, 2000);
      });

      // 股票选择变化时显示上下文
      const stockSelect = document.getElementById('ai-stock-select');
      stockSelect.addEventListener('change', () => {
        const code = stockSelect.value;
        const ctxArea = document.getElementById('ai-context-area');
        if (!code) { ctxArea.innerHTML = ''; return; }
        const ctx = stockContexts[code];
        if (!ctx) { ctxArea.innerHTML = '<div class="empty">未找到该股票的上下文数据</div>'; return; }
        renderContext(ctxArea, ctx);
      });

      function renderContext(area, ctx) {
        const news = ctx.news || [];
        const dt = ctx.dragon_tiger || [];
        let html = '<div class="ai-context">';

        html += '<div class="ai-context-card"><h4>近期新闻 (' + news.length + '条)</h4>';
        if (news.length === 0) {
          html += '<div class="muted">暂无新闻数据</div>';
        } else {
          html += news.slice(0, 10).map(n => {
            const sCls = n.sentiment === '利好' ? 'positive' : n.sentiment === '利空' ? 'negative' : 'neutral';
            return '<div class="ai-news-mini">' +
              '<div class="t">' + escapeHtml(n.title) + '</div>' +
              '<div class="m">' + escapeHtml(n.published_at || '') + ' · ' + escapeHtml(n.source || '') +
              ' <span class="sentiment-tag ' + sCls + '">' + escapeHtml(n.sentiment || '中性') + '</span></div>' +
              '</div>';
          }).join('');
        }
        html += '</div>';

        html += '<div class="ai-context-card"><h4>龙虎榜 (' + dt.length + '个交易日)</h4>';
        if (dt.length === 0) {
          html += '<div class="muted">暂无龙虎榜数据</div>';
        } else {
          html += dt.slice(0, 5).map(d => {
            const ops = (d.operations || []).slice(0, 5);
            return '<div class="ai-dt-mini"><div class="d">' + escapeHtml(d.date) + '</div>' +
              ops.map(op => {
                const dir = op.direction === '买入' ? 'buy' : 'sell';
                return '<div style="font-size:12px;margin-left:8px;">' +
                  '<span class="' + dir + '">' + escapeHtml(op.direction || '') + '</span> ' +
                  escapeHtml(op.seatName || op.seat_name || '') +
                  (op.amount != null ? ' · ' + fmtAmount(op.amount) : '') +
                  '</div>';
              }).join('') +
              '</div>';
          }).join('');
        }
        html += '</div></div>';
        area.innerHTML = html;
      }

      // Markdown 渲染函数
      function renderMarkdown(text) {
        let html = escapeHtml(text);
        html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/```[\s\S]*?```/g, function(match) {
          const code = match.slice(3, -3).replace(/^[a-z]*\n/, '');
          return '<pre><code>' + code + '</code></pre>';
        });
        html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
        html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
        html = html.replace(/^\* (.+)$/gm, '<li>$1</li>');
        html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
        html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
        html = html.replace(/^---$/gm, '<hr>');
        html = html.replace(/\n\n/g, '</p><p>');
        html = '<p>' + html + '</p>';
        html = html.replace(/<p><\/p>/g, '');
        html = html.replace(/<p>(<h[1-3]>)/g, '$1');
        html = html.replace(/(<\/h[1-3]>)<\/p>/g, '$1');
        html = html.replace(/<p>(<ul>)/g, '$1');
        html = html.replace(/(<\/ul>)<\/p>/g, '$1');
        html = html.replace(/<p>(<blockquote>)/g, '$1');
        html = html.replace(/(<\/blockquote>)<\/p>/g, '$1');
        html = html.replace(/<p>(<hr>)/g, '$1');
        html = html.replace(/<p>(<pre>)/g, '$1');
        html = html.replace(/(<\/pre>)<\/p>/g, '$1');
        return html;
      }

      // 分析按钮
      let abortController = null;
      let currentRawText = '';
      const analyzeBtn = document.getElementById('ai-analyze-btn');
      const stopBtn = document.getElementById('ai-stop-btn');

      function setAnalyzingState(isAnalyzing) {
        if (isAnalyzing) {
          analyzeBtn.disabled = true;
          analyzeBtn.classList.add('ai-btn-loading');
          analyzeBtn.textContent = '分析中...';
          stopBtn.style.display = 'inline-block';
          stockSelect.disabled = true;
        } else {
          analyzeBtn.disabled = false;
          analyzeBtn.classList.remove('ai-btn-loading');
          analyzeBtn.textContent = '开始分析';
          stopBtn.style.display = 'none';
          stockSelect.disabled = false;
        }
      }

      analyzeBtn.addEventListener('click', async () => {
        const code = stockSelect.value;
        if (!code) { alert('请先选择一只股票'); return; }

        const baseUrl = (document.getElementById('ai-baseurl').value || localStorage.getItem('ai_base_url') || '').replace(/\/+$/, '');
        const apiKey = document.getElementById('ai-key').value || localStorage.getItem('ai_api_key') || '';
        const model = document.getElementById('ai-model').value || localStorage.getItem('ai_model') || '';

        if (!baseUrl || !apiKey || !model) {
          alert('请先配置 API Base URL、API Key 和模型名称');
          return;
        }

        const stockName = stockNames[code] || '';
        const ctx = stockContexts[code] || {};
        const userPrompt = document.getElementById('ai-prompt').value.trim() ||
          '请从资金面（龙虎榜数据）、消息面（近期新闻）两个维度，综合分析该股票的近期走势和市场关注度，给出简要的投资参考意见。';

        let contextText = '## 股票: ' + code + (stockName ? ' - ' + stockName : '') + '\n\n';
        const news = ctx.news || [];
        if (news.length > 0) {
          contextText += '### 近期新闻\n';
          news.forEach((n, i) => {
            contextText += (i+1) + '. [' + (n.sentiment || '中性') + '] ' + n.title +
              ' (' + (n.source || '') + ', ' + (n.published_at || '') + ')\n';
            if (n.content) contextText += '   摘要: ' + n.content.substring(0, 200) + '\n';
          });
          contextText += '\n';
        }
        const dt = ctx.dragon_tiger || [];
        if (dt.length > 0) {
          contextText += '### 龙虎榜数据\n';
          dt.forEach(d => {
            contextText += '日期: ' + d.date + '\n';
            (d.operations || []).forEach(op => {
              contextText += '  ' + (op.direction || '') + ' ' + (op.seatName || op.seat_name || '') +
                (op.amount != null ? ' 金额:' + fmtAmount(op.amount) : '') + '\n';
            });
          });
        }

        const resultArea = document.getElementById('ai-result-area');
        const statusEl = document.getElementById('ai-status');

        // 显示 thinking 状态
        resultArea.innerHTML = `
          <div class="ai-result-card">
            <div class="ai-result-header">
              <h4>分析结果</h4>
            </div>
            <div class="ai-thinking">
              <div class="ai-thinking-dots"><span></span><span></span><span></span></div>
              <span>AI 正在思考中...</span>
            </div>
          </div>`;
        statusEl.textContent = '';
        setAnalyzingState(true);
        currentRawText = '';

        abortController = new AbortController();
        let firstTokenReceived = false;

        try {
          const apiUrl = baseUrl + '/chat/completions';
          const body = {
            model: model,
            messages: [
              { role: 'system', content: '你是一位专业的 A 股市场分析师。请基于提供的股票数据和新闻信息，给出专业、客观的分析。回答使用中文，使用 Markdown 格式输出。' },
              { role: 'user', content: contextText + '\n---\n' + userPrompt }
            ],
            stream: true,
            temperature: 0.7,
            max_tokens: 2000,
          };

          const resp = await fetch(apiUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + apiKey,
            },
            body: JSON.stringify(body),
            signal: abortController.signal,
          });

          if (!resp.ok) {
            const errText = await resp.text();
            throw new Error('API 请求失败 (' + resp.status + '): ' + errText.substring(0, 300));
          }

          let streamEl = null;

          function initResultArea() {
            resultArea.innerHTML = `
              <div class="ai-result-card">
                <div class="ai-result-header">
                  <h4>分析结果</h4>
                  <div class="ai-result-tabs">
                    <button class="active" data-mode="rendered">渲染</button>
                    <button data-mode="raw">原文</button>
                  </div>
                </div>
                <div class="ai-result-content rendered" id="ai-stream"></div>
              </div>`;
            streamEl = document.getElementById('ai-stream');

            resultArea.querySelectorAll('.ai-result-tabs button').forEach(btn => {
              btn.addEventListener('click', () => {
                resultArea.querySelectorAll('.ai-result-tabs button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const mode = btn.dataset.mode;
                streamEl.className = 'ai-result-content ' + mode;
                if (mode === 'rendered') {
                  streamEl.innerHTML = renderMarkdown(currentRawText);
                } else {
                  streamEl.textContent = currentRawText;
                }
              });
            });
          }

          const reader = resp.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';
          let tokenCount = 0;

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            for (const line of lines) {
              const trimmed = line.trim();
              if (!trimmed || !trimmed.startsWith('data:')) continue;
              const data = trimmed.slice(5).trim();
              if (data === '[DONE]') continue;
              try {
                const json = JSON.parse(data);
                const delta = json.choices && json.choices[0] && json.choices[0].delta;
                if (delta && delta.content) {
                  // 收到第一个 token 时，初始化结果区域
                  if (!firstTokenReceived) {
                    firstTokenReceived = true;
                    initResultArea();
                  }
                  currentRawText += delta.content;
                  tokenCount++;
                  const activeMode = resultArea.querySelector('.ai-result-tabs button.active')?.dataset.mode || 'rendered';
                  if (activeMode === 'rendered') {
                    streamEl.innerHTML = renderMarkdown(currentRawText);
                  } else {
                    streamEl.textContent = currentRawText;
                  }
                  streamEl.scrollTop = streamEl.scrollHeight;
                }
              } catch (e) { /* skip malformed chunks */ }
            }
          }

          statusEl.textContent = '分析完成，共 ' + tokenCount + ' 个 token 片段';
        } catch (err) {
          if (err.name === 'AbortError') {
            // 如果还没有收到第一个 token，初始化结果区域
            if (!firstTokenReceived) {
              initResultArea();
            }
            currentRawText += '\n\n已停止生成';
            if (streamEl) {
              const activeMode = resultArea.querySelector('.ai-result-tabs button.active')?.dataset.mode || 'rendered';
              if (activeMode === 'rendered') {
                streamEl.innerHTML = renderMarkdown(currentRawText);
              } else {
                streamEl.textContent = currentRawText;
              }
            }
            statusEl.textContent = '已手动停止';
          } else {
            resultArea.innerHTML = '<div class="ai-result-card"><div class="ai-result-content" style="color:var(--danger);">错误: ' + escapeHtml(err.message) + '</div></div>';
            statusEl.textContent = '请求失败';
          }
        } finally {
          setAnalyzingState(false);
          abortController = null;
        }
      });

      // 停止按钮
      stopBtn.addEventListener('click', () => {
        if (abortController) abortController.abort();
      });
    }

    async function main() {
      bindTabs();
      await loadManifest();
      await loadTab('dragon_query');
    }
    main();
  </script>
</body>
</html>
