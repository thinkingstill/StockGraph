<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockGraph</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts-gl/dist/echarts-gl.min.js"></script>
  <style>
    :root {
      --bg: #eef2e6;
      --surface: rgba(255,255,255,0.88);
      --card: #ffffff;
      --text: #182026;
      --muted: #5f6c76;
      --line: #d9dfd1;
      --accent: #164e63;
      --accent-2: #2f6f55;
      --danger: #c2410c;
      --success: #166534;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(22,78,99,0.12), transparent 25%),
        radial-gradient(circle at bottom right, rgba(47,111,85,0.10), transparent 30%),
        linear-gradient(180deg, #f8faf6 0%, var(--bg) 100%);
    }
    .shell {
      max-width: 1480px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }
    .hero {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: end;
      margin-bottom: 20px;
    }
    .hero h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.1;
    }
    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
    }
    .status {
      min-width: 280px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      backdrop-filter: blur(8px);
      font-size: 13px;
      color: var(--muted);
    }
    .workspace-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .tabs {
      display: none;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .tabs.active { display: flex; }
    .workspace-btn,
    .tab-btn {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.75);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
    }
    .tab-btn {
      padding: 8px 14px;
      font-size: 13px;
      border-radius: 12px;
    }
    .workspace-btn.active,
    .tab-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border-color: transparent;
    }
    .panel {
      display: none;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 50px rgba(24,32,38,0.06);
    }
    .panel.active { display: block; }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }
    .card {
      grid-column: span 12;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat {
      background: #f8faf7;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }
    .stat .k { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .stat .v { font-size: 24px; font-weight: 700; }
    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    input, select, button {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
    }
    button {
      background: #fff;
      cursor: pointer;
    }
    .primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border-color: transparent;
    }
    .chart {
      width: 100%;
      min-height: 420px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid #edf0e8;
      text-align: left;
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 600; }
    .muted { color: var(--muted); }
    .buy { color: #dc2626; font-weight: 600; }
    .sell { color: #15803d; font-weight: 600; }
    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 16px;
      background: #fafbf8;
    }
    .split-2 { grid-column: span 6; }
    @media (max-width: 980px) {
      .hero { flex-direction: column; align-items: stretch; }
      .split-2 { grid-column: span 12; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <div>
        <h1>StockGraph</h1>
        <p>统一入口，按分析任务进入龙虎榜、市场热度、行业观察和个股研判。每个视图独立取数，互不阻塞。</p>
      </div>
      <div class="status">
        <div>页面: <strong>app/index.html</strong></div>
        <div id="manifestStatus" style="margin-top:8px;">正在加载数据清单...</div>
      </div>
    </div>

    <div class="workspace-tabs" id="workspaceTabs">
      <button class="workspace-btn active" data-workspace="dragon" data-default-tab="dragon_query">龙虎榜</button>
      <button class="workspace-btn" data-workspace="market" data-default-tab="market_hot">市场热度</button>
      <button class="workspace-btn" data-workspace="industry" data-default-tab="market_industry">行业观察</button>
      <button class="workspace-btn" data-workspace="stock" data-default-tab="smart_analysis">个股研判</button>
    </div>

    <div class="tabs active" data-workspace="dragon">
      <button class="tab-btn active" data-tab="dragon_query">明细查询</button>
      <button class="tab-btn" data-tab="dragon_graph">关系网络</button>
    </div>
    <div class="tabs" data-workspace="market">
      <button class="tab-btn" data-tab="market_hot">3D 热度</button>
      <button class="tab-btn" data-tab="stock_super_graph">全 A 图谱</button>
      <button class="tab-btn" data-tab="china_city_bubble">城市气泡</button>
    </div>
    <div class="tabs" data-workspace="industry">
      <button class="tab-btn" data-tab="market_industry">强弱排行</button>
      <button class="tab-btn" data-tab="market_calendar">行业日历</button>
    </div>
    <div class="tabs" data-workspace="stock">
      <button class="tab-btn" data-tab="smart_analysis">智能分析</button>
      <button class="tab-btn" data-tab="analysis_config">分析配置</button>
    </div>

    <section class="panel active" id="panel-dragon_query">
      <div id="dragonQueryRoot" class="empty">正在加载龙虎榜查询数据...</div>
    </section>

    <section class="panel" id="panel-dragon_graph">
      <div id="dragonGraphRoot" class="empty">正在加载龙虎榜关系网数据...</div>
    </section>

    <section class="panel" id="panel-market_hot">
      <div id="marketHotRoot" class="empty">正在加载市场热度数据...</div>
    </section>

    <section class="panel" id="panel-stock_super_graph">
      <div id="stockSuperGraphRoot" class="empty">正在加载全 A 图谱数据...</div>
    </section>

    <section class="panel" id="panel-china_city_bubble">
      <div id="chinaCityBubbleRoot" class="empty">正在加载城市气泡图数据...</div>
    </section>

    <section class="panel" id="panel-market_calendar">
      <div id="marketCalendarRoot" class="empty">正在加载行业日历数据...</div>
    </section>

    <section class="panel" id="panel-market_industry">
      <div id="marketIndustryRoot" class="empty">正在加载行业强弱数据...</div>
    </section>

    <section class="panel" id="panel-smart_analysis">
      <div id="smartAnalysisRoot" class="empty">正在加载智能分析...</div>
    </section>

    <section class="panel" id="panel-analysis_config">
      <div id="analysisConfigRoot" class="empty">正在加载分析配置...</div>
    </section>
  </div>

  <script>
    const state = { manifest: null, loaded: {}, stockNames: {} };

    function fmtAmount(v) {
      const n = Number(v || 0);
      return n >= 10000 ? (n / 10000).toFixed(2) + '亿' : n.toFixed(2) + '万';
    }
    function fmtYuanAmount(v) {
      const n = Number(v || 0);
      if (Math.abs(n) >= 1000000000000) return (n / 1000000000000).toFixed(2) + '万亿';
      if (Math.abs(n) >= 100000000) return (n / 100000000).toFixed(2) + '亿';
      if (Math.abs(n) >= 10000) return (n / 10000).toFixed(2) + '万';
      return n.toFixed(2) + '元';
    }
    function formatMetricValue(field, value) {
      if (field === 'amount') return fmtYuanAmount(value);
      if (['latest_price','change_amount','buy_price','sell_price','prev_close','open_price','high_price','low_price'].includes(field)) {
        return Number(value || 0).toFixed(2) + '元';
      }
      return Number(value || 0).toFixed(2);
    }
    function escapeHtml(text) {
      return String(text ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
    }
    function getStockDisplayName(code) {
      if (!code) return '';
      const name = state.stockNames[code];
      return name ? `${code} ${name}` : code;
    }
    async function fetchJson(path) {
      const res = await fetch(path, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }
    function dateRangeControls(prefix, dates, startDate, endDate) {
      return `
        <select id="${prefix}-start">${dates.map(d => `<option value="${escapeHtml(d)}" ${d === startDate ? 'selected' : ''}>起: ${escapeHtml(d)}</option>`).join('')}</select>
        <select id="${prefix}-end">${dates.map(d => `<option value="${escapeHtml(d)}" ${d === endDate ? 'selected' : ''}>止: ${escapeHtml(d)}</option>`).join('')}</select>`;
    }
    function selectedDateRange(prefix, dates) {
      const start = document.getElementById(`${prefix}-start`)?.value || dates[0] || '';
      const end = document.getElementById(`${prefix}-end`)?.value || start;
      const a = dates.indexOf(start);
      const b = dates.indexOf(end);
      if (a < 0 || b < 0) return dates.slice(0, 1);
      const from = Math.min(a, b);
      const to = Math.max(a, b);
      return dates.slice(from, to + 1);
    }
    function dateRangeLabel(range) {
      if (!range.length) return '-';
      return range.length === 1 ? range[0] : `${range[0]} 至 ${range[range.length - 1]}`;
    }
    function flattenByDate(map, range) {
      return range.flatMap(date => (map[date] || []).map(row => ({ ...row, date: row.date || date })));
    }
    function activateTab(name) {
      const btn = document.querySelector(`.tab-btn[data-tab="${name}"]`);
      if (!btn) return;
      const workspace = btn.closest('.tabs')?.dataset.workspace || '';
      document.querySelectorAll('.workspace-btn').forEach(x => x.classList.toggle('active', x.dataset.workspace === workspace));
      document.querySelectorAll('.tabs').forEach(x => x.classList.toggle('active', x.dataset.workspace === workspace));
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.toggle('active', x.dataset.tab === name));
      document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
      document.getElementById(`panel-${name}`).classList.add('active');
      loadTab(name);
    }
    function bindTabs() {
      document.querySelectorAll('.workspace-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const activeChild = document.querySelector(`.tabs[data-workspace="${btn.dataset.workspace}"] .tab-btn.active`);
          activateTab(activeChild?.dataset.tab || btn.dataset.defaultTab);
        });
      });
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          activateTab(btn.dataset.tab);
        });
      });
    }
    async function loadManifest() {
      try {
        state.manifest = await fetchJson('./data/app_manifest.json');
        state.stockNames = state.manifest.stock_names || {};
        const ok = Object.entries(state.manifest.sections || {}).filter(([,v]) => v.available).length;
        document.getElementById('manifestStatus').textContent = `已加载数据清单，可用模块 ${ok}/${Object.keys(state.manifest.sections || {}).length}，生成时间 ${state.manifest.generated_at || '-'}`;
      } catch (e) {
        document.getElementById('manifestStatus').textContent = `数据清单加载失败: ${e.message}`;
      }
    }
    async function loadTab(name) {
      if (!state.manifest || state.loaded[name]) return;
      const section = state.manifest.sections[name];
      const rootMap = {
        dragon_query: 'dragonQueryRoot',
        dragon_graph: 'dragonGraphRoot',
        market_hot: 'marketHotRoot',
        stock_super_graph: 'stockSuperGraphRoot',
        china_city_bubble: 'chinaCityBubbleRoot',
        market_calendar: 'marketCalendarRoot',
        market_industry: 'marketIndustryRoot',
        smart_analysis: 'smartAnalysisRoot',
        analysis_config: 'analysisConfigRoot',
      };
      const root = document.getElementById(rootMap[name]);
      
      // 分析配置页面不需要从后端获取数据
      if (name === 'analysis_config') {
        renderAnalysisConfig(root);
        state.loaded[name] = true;
        return;
      }
      
      // 智能分析页面需要获取stock_news和ai_analysis两个数据源
      if (name === 'smart_analysis') {
        const newsSection = state.manifest.sections['stock_news'];
        const aiSection = state.manifest.sections['ai_analysis'];
        let newsPayload = { stock_codes: [], stock_summaries: [], stock_news: {}, total_articles: 0 };
        let aiPayload = { stock_codes: [], stock_names: {}, stock_contexts: {} };
        try {
          if (newsSection && newsSection.available) newsPayload = await fetchJson(newsSection.path);
        } catch (e) { /* ignore */ }
        try {
          if (aiSection && aiSection.available) aiPayload = await fetchJson(aiSection.path);
        } catch (e) { /* ignore */ }
        renderSmartAnalysis(root, { news: newsPayload, ai: aiPayload });
        state.loaded[name] = true;
        return;
      }
      
      if (!section || !section.available) {
        root.innerHTML = `<div class="empty">该页面当前无可用数据。<div style="margin-top:8px;">${escapeHtml(section?.message || '未生成对应数据文件')}</div></div>`;
        state.loaded[name] = true;
        return;
      }
      try {
        const payload = await fetchJson(section.path);
        if (name === 'dragon_query') renderDragonQuery(root, payload);
        if (name === 'dragon_graph') renderDragonGraph(root, payload);
        if (name === 'market_hot') renderMarketHot(root, payload);
        if (name === 'stock_super_graph') renderStockSuperGraph(root, payload);
        if (name === 'china_city_bubble') renderChinaCityBubble(root, payload);
        if (name === 'market_calendar') renderMarketCalendar(root, payload);
        if (name === 'market_industry') renderMarketIndustry(root, payload);
        state.loaded[name] = true;
      } catch (e) {
        root.innerHTML = `<div class="empty">数据加载失败<div style="margin-top:8px;">${escapeHtml(e.message)}</div></div>`;
        state.loaded[name] = true;
      }
    }

    function renderDragonQuery(root, payload) {
      const dates = payload.date_list || [];
      const defaultStart = payload.latest_date || dates[0] || '';
      const defaultEnd = defaultStart;
      root.innerHTML = `
        <div class="stats">
          <div class="stat"><div class="k">日期区间</div><div class="v" id="dq-date">-</div></div>
          <div class="stat"><div class="k">股票数</div><div class="v" id="dq-stock-count">0</div></div>
          <div class="stat"><div class="k">席位数</div><div class="v" id="dq-seat-count">0</div></div>
          <div class="stat"><div class="k">记录数</div><div class="v" id="dq-total">0</div></div>
        </div>
        <div class="filters">
          ${dateRangeControls('dq', dates, defaultStart, defaultEnd)}
          <input id="dq-stock" placeholder="股票代码或名称">
          <input id="dq-seat" placeholder="席位或外号">
          <button class="primary" id="dq-search">查询</button>
          <button id="dq-clear">清空</button>
        </div>
        <div class="grid">
          <div class="card split-2"><div class="muted" style="margin-bottom:10px;">活跃股票</div><table><thead><tr><th>股票</th><th>席位数</th><th>买入金额(万元/亿元)</th><th>卖出金额(万元/亿元)</th></tr></thead><tbody id="dq-stocks"></tbody></table></div>
          <div class="card split-2"><div class="muted" style="margin-bottom:10px;">活跃席位</div><table><thead><tr><th>席位</th><th>类型</th><th>次数</th><th>净额(万元/亿元)</th></tr></thead><tbody id="dq-seats"></tbody></table></div>
          <div class="card"><div class="muted" style="margin-bottom:10px;">查询结果</div><table><thead><tr><th>股票</th><th>席位</th><th>方向</th><th>金额(万元/亿元)</th></tr></thead><tbody id="dq-results"></tbody></table></div>
        </div>`;

      const allData = payload.all_operations || {};

      function aggregateStocks(ops) {
        const grouped = new Map();
        ops.forEach(row => {
          const item = grouped.get(row.stockCode) || { code: row.stockCode, name: row.stockName, seats: new Set(), buy: 0, sell: 0 };
          item.seats.add(row.seatName);
          if (row.direction === '买') item.buy += Number(row.amount || 0);
          if (row.direction === '卖') item.sell += Number(row.amount || 0);
          grouped.set(row.stockCode, item);
        });
        return Array.from(grouped.values()).map(x => ({ ...x, seatCount: x.seats.size })).sort((a,b) => (b.seatCount - a.seatCount) || (b.buy - a.buy));
      }
      function aggregateSeats(ops) {
        const grouped = new Map();
        ops.forEach(row => {
          const item = grouped.get(row.seatName) || { name: row.seatName, type: row.seatType, alias: row.alias, count: 0, buy: 0, sell: 0 };
          item.count += 1;
          if (row.alias) item.alias = row.alias;
          if (row.direction === '买') item.buy += Number(row.amount || 0);
          if (row.direction === '卖') item.sell += Number(row.amount || 0);
          grouped.set(row.seatName, item);
        });
        return Array.from(grouped.values()).map(x => ({ ...x, net: x.buy - x.sell })).sort((a,b) => (b.count - a.count) || (b.buy - a.buy));
      }

      function draw() {
        const range = selectedDateRange('dq', dates);
        const stockKw = document.getElementById('dq-stock').value.trim().toLowerCase();
        const seatKw = document.getElementById('dq-seat').value.trim().toLowerCase();
        const ops = flattenByDate(allData, range).filter(item => {
          const stockPass = !stockKw || item.stockCode.toLowerCase().includes(stockKw) || item.stockName.toLowerCase().includes(stockKw);
          const seatPass = !seatKw || item.seatName.toLowerCase().includes(seatKw) || String(item.alias || '').toLowerCase().includes(seatKw);
          return stockPass && seatPass;
        });
        const stockRows = aggregateStocks(ops);
        const seatRows = aggregateSeats(ops);
        document.getElementById('dq-date').textContent = dateRangeLabel(range);
        document.getElementById('dq-stock-count').textContent = new Set(ops.map(x => x.stockCode)).size;
        document.getElementById('dq-seat-count').textContent = new Set(ops.map(x => x.seatName)).size;
        document.getElementById('dq-total').textContent = ops.length;
        document.getElementById('dq-stocks').innerHTML = stockRows.slice(0, 12).map(x => `<tr><td>${escapeHtml(x.name)} (${escapeHtml(x.code)})</td><td>${x.seatCount}</td><td class="buy">${fmtAmount(x.buy)}</td><td class="sell">${fmtAmount(x.sell)}</td></tr>`).join('');
        document.getElementById('dq-seats').innerHTML = seatRows.slice(0, 12).map(x => `<tr><td>${escapeHtml(x.name)}</td><td>${escapeHtml(x.type || '-')}</td><td>${x.count}</td><td class="${x.net >= 0 ? 'buy' : 'sell'}">${fmtAmount(x.net)}</td></tr>`).join('');
        document.getElementById('dq-results').innerHTML = ops.slice(0, 120).map(x => `<tr><td>${escapeHtml(x.date)}<br>${escapeHtml(x.stockName)} (${escapeHtml(x.stockCode)})</td><td>${escapeHtml(x.seatName)}</td><td class="${x.direction === '买' ? 'buy' : 'sell'}">${x.direction}</td><td>${fmtAmount(x.amount)}</td></tr>`).join('');
      }

      document.getElementById('dq-search').addEventListener('click', draw);
      document.getElementById('dq-clear').addEventListener('click', () => {
        document.getElementById('dq-stock').value = '';
        document.getElementById('dq-seat').value = '';
        draw();
      });
      ['dq-start','dq-end'].forEach(id => document.getElementById(id).addEventListener('change', draw));
      draw();
    }

    function renderDragonGraph(root, payload) {
      const all = payload.records || [];
      const dates = Array.from(new Set(all.map(x => x.date).filter(Boolean))).sort().reverse();
      const defaultStart = dates[0] || '';
      const defaultEnd = defaultStart;
      root.innerHTML = `
        <div class="filters">
          ${dateRangeControls('dg', dates, defaultStart, defaultEnd)}
          <input id="dg-keyword" placeholder="股票、席位、类型关键词">
          <button class="primary" id="dg-run">查询</button>
          <button id="dg-reset">重置</button>
        </div>
        <div class="stats">
          <div class="stat"><div class="k">关系记录</div><div class="v" id="dg-total">0</div></div>
          <div class="stat"><div class="k">席位数</div><div class="v" id="dg-seats">0</div></div>
          <div class="stat"><div class="k">股票数</div><div class="v" id="dg-stocks">0</div></div>
          <div class="stat"><div class="k">边数</div><div class="v" id="dg-links">0</div></div>
        </div>
        <div class="card"><div id="dg-chart" class="chart"></div></div>`;
      const chart = echarts.init(document.getElementById('dg-chart'));
      function draw() {
        const range = new Set(selectedDateRange('dg', dates));
        const kw = document.getElementById('dg-keyword').value.trim().toLowerCase();
        const data = all.filter(x => range.has(x.date) && (!kw || x.stock_code.toLowerCase().includes(kw) || x.stock_name.toLowerCase().includes(kw) || x.seat_name.toLowerCase().includes(kw) || String(x.seat_type || '').toLowerCase().includes(kw) || String(x.trader_alias || '').toLowerCase().includes(kw)));
        const seatMap = new Map();
        const stockMap = new Map();
        data.forEach(r => {
          if (!seatMap.has(r.seat_name)) seatMap.set(r.seat_name, { name: r.seat_name, type: r.seat_type, value: 0 });
          if (!stockMap.has(r.stock_code)) stockMap.set(r.stock_code, { code: r.stock_code, name: r.stock_name, value: 0 });
          seatMap.get(r.seat_name).value += Number(r.amount || 0);
          stockMap.get(r.stock_code).value += Number(r.amount || 0);
        });
        const topSeats = Array.from(seatMap.values()).sort((a,b) => b.value - a.value).slice(0, 30);
        const topStocks = Array.from(stockMap.values()).sort((a,b) => b.value - a.value).slice(0, 30);
        const nodeMap = new Map();
        const nodes = [];
        topSeats.forEach((x, i) => {
          const id = `S${i}`;
          nodeMap.set(x.name, id);
          nodes.push({ name: id, value: x.value, category: x.type === '机构' ? 1 : x.type === '外资' ? 3 : 2, label: { show: true }, fullName: x.name, shortName: x.name.slice(0,4) });
        });
        topStocks.forEach((x, i) => {
          const id = `T${i}`;
          nodeMap.set(x.code, id);
          nodes.push({ name: id, value: x.value, category: 0, label: { show: true }, fullName: `${x.name}(${x.code})`, shortName: x.name.slice(0,4) });
        });
        const links = data.map(r => {
          const s = nodeMap.get(r.seat_name);
          const t = nodeMap.get(r.stock_code);
          if (!s || !t) return null;
          return { source: s, target: t, value: Number(r.amount || 0), lineStyle: { color: r.direction === '买' ? '#dc2626' : '#15803d' } };
        }).filter(Boolean);
        document.getElementById('dg-total').textContent = data.length;
        document.getElementById('dg-seats').textContent = topSeats.length;
        document.getElementById('dg-stocks').textContent = topStocks.length;
        document.getElementById('dg-links').textContent = links.length;
        chart.setOption({
          tooltip: { formatter: p => p.dataType === 'node' ? (p.data.fullName || p.name) : fmtAmount(p.data.value || 0) },
          legend: [{ data: ['股票','机构','游资','外资'] }],
          series: [{
            type: 'graph',
            layout: 'force',
            roam: true,
            force: { repulsion: 380, edgeLength: 90 },
            categories: [{name:'股票'},{name:'机构'},{name:'游资'},{name:'外资'}],
            label: { formatter: p => p.data.shortName || '' },
            data: nodes,
            links: links,
            lineStyle: { opacity: 0.55, curveness: 0.12 },
          }]
        }, true);
      }
      document.getElementById('dg-run').addEventListener('click', draw);
      document.getElementById('dg-reset').addEventListener('click', () => { document.getElementById('dg-keyword').value = ''; draw(); });
      ['dg-start','dg-end'].forEach(id => document.getElementById(id).addEventListener('change', draw));
      draw();
    }

      });

      function aggregateGraphs(range) {
        if (range.length === 1) return graphs[range[0]] || { nodes: [], links: [], stats: {} };
        const nodeMap = new Map();
        const linkMap = new Map();
        range.forEach(date => {
          const g = graphs[date] || { nodes: [], links: [] };
          (g.nodes || []).forEach(node => {
            const current = nodeMap.get(node.id) || { ...node, value: 0, attributes: { ...(node.attributes || {}) }, dates: new Set() };
            current.value += Number(node.value || 0);
            current.dates.add(date);
            current.attributes = { ...current.attributes, ...(node.attributes || {}) };
            current.attributes.date_count = current.dates.size;
            nodeMap.set(node.id, current);
          });
          (g.links || []).forEach(link => {
            const key = `${link.source}|${link.target}|${link.type}`;
            const current = linkMap.get(key) || { ...link, value: 0, attributes: { ...(link.attributes || {}) }, dates: new Set() };
            current.value += Number(link.value || 0);
            current.dates.add(date);
            current.attributes = { ...current.attributes, ...(link.attributes || {}) };
            current.attributes.date_count = current.dates.size;
            linkMap.set(key, current);
          });
        });
        const nodes = Array.from(nodeMap.values()).map(({ dates, ...node }) => node);
        const links = Array.from(linkMap.values()).map(({ dates, ...link }) => link);
        return {
          date: dateRangeLabel(range),
          nodes,
          links,
          stats: {
            stock_count: nodes.filter(n => n.category === 'stock').length,
            seat_count: nodes.filter(n => n.category === 'seat').length,
            news_count: nodes.filter(n => n.category === 'news').length,
            edge_count: links.length,
          },
        };
      }
      function graph() {
        return aggregateGraphs(selectedDateRange('sg', dates));
      }
      function getCheckedCategories() {
        return new Set(Array.from(document.querySelectorAll('.sg-cat:checked')).map(x => x.value));
      }
      function getCheckedRelations() {
        return new Set(Array.from(document.querySelectorAll('.sg-rel:checked')).map(x => x.value));
      }
      function fillFilters() {
        const g = graph();
        const currentIndustry = document.getElementById('sg-industry').value;
        const currentExchange = document.getElementById('sg-exchange').value;
        const industries = Array.from(new Set((g.nodes || []).filter(n => n.category === 'industry').map(n => n.name))).sort();
        const exchanges = Array.from(new Set((g.nodes || []).filter(n => n.category === 'exchange').map(n => n.name))).sort();
        document.getElementById('sg-industry').innerHTML = '<option value="">全部行业</option>' + industries.map(x => `<option value="${escapeHtml(x)}">${escapeHtml(x)}</option>`).join('');
        document.getElementById('sg-exchange').innerHTML = '<option value="">全部交易所</option>' + exchanges.map(x => `<option value="${escapeHtml(x)}">${escapeHtml(x)}</option>`).join('');
        if (industries.includes(currentIndustry)) document.getElementById('sg-industry').value = currentIndustry;
        if (exchanges.includes(currentExchange)) document.getElementById('sg-exchange').value = currentExchange;
        updateStockTags();
      }
      function nodeMatchesFilters(node, keyword, industry, exchange, checked) {
        if (!checked.has(node.category)) return false;
        const attr = node.attributes || {};
        const text = `${node.name} ${attr.code || ''} ${attr.stock_name || ''} ${attr.industry || ''} ${attr.exchange || ''} ${attr.title || ''} ${attr.seat_type || ''} ${attr.trader_alias || ''}`.toLowerCase();
        if (keyword && !text.includes(keyword)) return false;
        if (industry) {
          if (node.category === 'stock' && attr.industry !== industry) return false;
          if (node.category === 'industry' && node.name !== industry) return false;
        }
        if (exchange) {
          if (node.category === 'stock' && attr.exchange !== exchange) return false;
          if (node.category === 'exchange' && node.name !== exchange) return false;
        }
        return true;
      }
      function selectCore(g, keyword, selectedStocks, industry, exchange, checked, relChecked, scale) {
        const allNodes = g.nodes || [];
        const nodeById = new Map(allNodes.map(n => [n.id, n]));
        const allLinks = (g.links || []).filter(l => relChecked.has(l.type));
        let limit = scale === 'all' ? allNodes.length : Number(scale || 500);
        const score = new Map(allNodes.map(n => [n.id, Number(n.value || 0)]));
        allLinks.forEach(l => {
          score.set(l.source, (score.get(l.source) || 0) + Number(l.value || 0) * 0.05);
          score.set(l.target, (score.get(l.target) || 0) + Number(l.value || 0) * 0.05);
        });
        
        if (selectedStocks.length > 0) {
          const selectedIds = new Set(selectedStocks);
          allLinks
            .filter(l => selectedStocks.includes(l.source) || selectedStocks.includes(l.target))
            .sort((a,b) => Number(b.value || 0) - Number(a.value || 0))
            .slice(0, limit)
            .forEach(l => {
              const otherId = selectedStocks.includes(l.source) ? l.target : l.source;
              const other = nodeById.get(otherId);
              if (other && checked.has(other.category)) selectedIds.add(otherId);
            });
          const nodes = allNodes.filter(n => selectedIds.has(n.id));
          const links = allLinks.filter(l => selectedIds.has(l.source) && selectedIds.has(l.target));
          return { nodes, links };
        }
        
        const base = allNodes.filter(n => nodeMatchesFilters(n, keyword, industry, exchange, checked));
        const selectedIds = new Set(base.sort((a,b) => (score.get(b.id) || 0) - (score.get(a.id) || 0)).slice(0, limit).map(n => n.id));
        if (keyword || industry || exchange) {
          allLinks.forEach(l => {
            if (selectedIds.has(l.source) || selectedIds.has(l.target)) {
              const s = nodeById.get(l.source);
              const t = nodeById.get(l.target);
              if (s && checked.has(s.category)) selectedIds.add(s.id);
              if (t && checked.has(t.category)) selectedIds.add(t.id);
            }
          });
        }
        const nodes = allNodes.filter(n => selectedIds.has(n.id));
        const links = allLinks.filter(l => selectedIds.has(l.source) && selectedIds.has(l.target));
        return { nodes, links };
      }

      function formatMarketCap(v) {

      function colorByChange(pct) {

        if (value > 0) {

          const b = Math.round(110 - 72 * intensity);
          return `rgb(220,${g},${b})`;
        }
        const r = Math.round(96 - 54 * intensity);
        const g = Math.round(156 - 76 * intensity);

        return `rgb(${r},${g},${b})`;

      function aggregateCityRange(range) {

              down_count: 0,
              flat_count: 0,
              date_count: 0,
              top_industries_map: new Map(),
              location_quality: {},

              market_cap_bucket: city.market_cap_bucket,
            };
            item.date_count += 1;
            item.stock_count = Math.max(item.stock_count, Number(city.stock_count || 0));
            item.known_market_cap_count = Math.max(item.known_market_cap_count, Number(city.known_market_cap_count || 0));
            item.total_market_cap_sum += Number(city.total_market_cap || 0);
            item.weighted_change_sum += Number(city.avg_change_pct || 0) * Number(city.total_market_cap || 0);
            item.amount += Number(city.amount || 0);
            item.volume += Number(city.volume || 0);
            item.up_count += Number(city.up_count || 0);
            item.down_count += Number(city.down_count || 0);
            item.flat_count += Number(city.flat_count || 0);
            Object.entries(city.location_quality || {}).forEach(([k, v]) => { item.location_quality[k] = (item.location_quality[k] || 0) + Number(v || 0); });
            (city.top_industries || []).forEach(ind => {
              const current = item.top_industries_map.get(ind.industry) || { industry: ind.industry, stock_count: 0, market_cap: 0, change_sum: 0, days: 0 };
              current.stock_count = Math.max(current.stock_count, Number(ind.stock_count || 0));
              current.market_cap += Number(ind.market_cap || 0);

        const provinces = Array.from(new Set(cities.map(x => x.province))).sort();
        const cityNames = Array.from(new Set(cities.map(x => x.city))).sort();

        if (province && city.province !== province) return false;
        if (cityName && city.city !== cityName) return false;
        if (industry && !(city.top_industries || []).some(x => x.industry === industry)) return false;
        if (cap && cap !== 'all' && city.market_cap_bucket !== cap) return false;
        if (quality && !(city.location_quality || {})[quality]) return false;
        if (minCount && Number(city.stock_count || 0) < minCount) return false;
        return true;
      }
      function aggregateIndustries(cities) {
        const map = new Map();
        cities.forEach(city => {
          (city.top_industries || []).forEach(item => {
            const current = map.get(item.industry) || { industry: item.industry, stock_count: 0, market_cap: 0, change_sum: 0 };
            current.stock_count += Number(item.stock_count || 0);
            current.market_cap += Number(item.market_cap || 0);
            current.change_sum += Number(item.avg_change_pct || 0) * Number(item.stock_count || 0);
            map.set(item.industry, current);
          });
        });
        return Array.from(map.values()).map(x => ({
          ...x,
          avg_change_pct: x.stock_count ? x.change_sum / x.stock_count : 0
        })).sort((a,b) => b.market_cap - a.market_cap);
      }
      function renderDetail(city) {
        if (!city) {
          document.getElementById('ccb-detail').innerHTML = '<span class="muted">点击地图气泡或城市排行查看行业和个股明细。</span>';
          return;
        }

            <td>${escapeHtml(x.industry)}</td>

            <td class="${Number(x.change_pct || 0) >= 0 ? 'buy' : 'sell'}">${Number(x.change_pct || 0).toFixed(2)}%</td>
          </tr>`).join('');
        const quality = Object.entries(city.location_quality || {}).map(([k,v]) => `${qualityLabel(k)} ${v}`).join(' / ');
        document.getElementById('ccb-detail').innerHTML = `
          <div style="font-weight:700;margin-bottom:6px;">${escapeHtml(city.province)} · ${escapeHtml(city.city)}</div>
          <div>公司数: ${city.stock_count}，总市值: ${formatMarketCap(city.total_market_cap)}，市值加权涨跌: <span class="${Number(city.avg_change_pct || 0) >= 0 ? 'buy' : 'sell'}">${Number(city.avg_change_pct || 0).toFixed(2)}%</span></div>
          <div>上涨/下跌/平盘: ${city.up_count}/${city.down_count}/${city.flat_count}</div>

          <table style="margin-top:10px;"><thead><tr><th>股票</th><th>行业</th><th>市值</th><th>涨跌</th></tr></thead><tbody>${stocks}</tbody></table>`;
      }
      function loadScriptOnce(src) {
        return new Promise((resolve, reject) => {
          const existing = document.querySelector(`script[data-stockgraph-src="${src}"]`);
          if (existing) {
            existing.addEventListener('load', resolve, { once: true });
            existing.addEventListener('error', () => reject(new Error(src)), { once: true });
            if (existing.dataset.loaded === '1') resolve();
            return;
          }
          const script = document.createElement('script');
          script.src = src;
          script.async = true;
          script.dataset.stockgraphSrc = src;
          script.onload = () => { script.dataset.loaded = '1'; resolve(); };
          script.onerror = () => reject(new Error(src));
          document.head.appendChild(script);
        });
      }
      async function ensureChinaMap() {
        if (chinaMapReady) return true;
        if (echarts.getMap && echarts.getMap('china')) {
          chinaMapReady = true;
          return true;
        }
        const scriptUrls = [
          './data/china_echarts_map.js',
          'https://cdn.jsdelivr.net/npm/echarts-maps@1.1.0/china.js'
        ];
        for (const url of scriptUrls) {
          try {
            await loadScriptOnce(url);
            if (!echarts.getMap || echarts.getMap('china')) {
              chinaMapReady = true;
              return true;
            }
          } catch (err) { /* try next source */ }
        }
        try {
          const res = await fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json', { cache: 'force-cache' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const geo = await res.json();
          echarts.registerMap('china', geo);
          chinaMapReady = true;
          return true;
        } catch (err) {
          document.getElementById('ccb-note').innerHTML = '中国地图边界加载失败，城市排行和 AI 分析仍可使用。请确认 ./data/china_echarts_map.js 是否已生成。最后错误: ' + escapeHtml(err.message);
          return false;
        }
      }
      async function draw() {

        const filteredWeighted = currentFiltered.reduce((sum, x) => sum + Number(x.avg_change_pct || 0) * Number(x.total_market_cap || 0), 0);
        const filteredChange = filteredCap ? filteredWeighted / filteredCap : 0;
        document.getElementById('ccb-change-v').innerHTML = `<span class="${filteredChange >= 0 ? 'buy' : 'sell'}">${filteredChange.toFixed(2)}%</span>`;
        document.getElementById('ccb-note').innerHTML =
          `定位质量: 精确映射 ${quality.mapped || 0} / 基础资料 ${quality.basic_info || 0} / 交易所降级 ${quality.exchange_fallback || 0}。` +
          `当前筛选 ${currentFiltered.length} 个城市，总市值 ${formatMarketCap(filteredCap)}。` +
          `精确城市数据可通过 ${escapeHtml(payload.location_mapping?.path || 'data/reference/stock_location_mapping.json')} 扩展。`;
        document.getElementById('ccb-table').innerHTML = currentFiltered.slice(0, 80).map((city, idx) => `
          <tr class="ccb-city-row" data-index="${idx}">
            <td>${escapeHtml(city.province)}<br><strong>${escapeHtml(city.city)}</strong></td>

        document.querySelectorAll('.ccb-city-row').forEach(row => {

        if (!(await ensureChinaMap())) return;
        chart.setOption({

              const industries = (city.top_industries || []).slice(0, 5).map(x => `${escapeHtml(x.industry)} ${x.stock_count}家`).join('<br/>');

                `市值加权涨跌: ${Number(city.avg_change_pct || 0).toFixed(2)}%<br/>` +
                `上涨/下跌/平盘: ${city.up_count}/${city.down_count}/${city.flat_count}<br/>` +
                `主要行业:<br/>${industries || '-'}`;
            }
          },
          geo: {
            map: 'china',
            roam: true,
            zoom: 1.18,
            label: { show: false },
            itemStyle: { areaColor: '#eef5ec', borderColor: '#b9c6b5' },
            emphasis: { itemStyle: { areaColor: '#dce8d8' }, label: { show: false } }
          },
          series: [{
            name: '城市总市值',
            type: 'scatter',
            coordinateSystem: 'geo',
            data: currentFiltered.map(city => ({
              ...city,
              name: city.city,
              value: [city.lng, city.lat, city.total_market_cap, city.avg_change_pct, city.stock_count],
              itemStyle: { color: colorByChange(city.avg_change_pct), borderColor: '#fff', borderWidth: 1, opacity: 0.88 }
            })),
            symbolSize: value => bubbleSize(value[2]),
            emphasis: { focus: 'self', scale: 1.35, label: { show: true, formatter: '{b}', position: 'right' } },
            label: {
              show: true,
              formatter: p => Number(p.data.stock_count || 0) >= 80 ? p.name : '',
              color: '#182026',
              fontSize: 10,
              position: 'right'
            }
          }]
        }, true);
      }
      ['ccb-start','ccb-end'].forEach(id => document.getElementById(id).addEventListener('change', () => {
        fillFilters();
        draw();
      }));
      ['ccb-province','ccb-city','ccb-industry','ccb-cap','ccb-quality'].forEach(id => document.getElementById(id).addEventListener('change', draw));
      document.getElementById('ccb-min-count').addEventListener('keyup', e => { if (e.key === 'Enter') draw(); });
      document.getElementById('ccb-run').addEventListener('click', draw);
      document.getElementById('ccb-reset').addEventListener('click', () => {

      chart.on('click', params => {
        if (params.componentSubType === 'scatter') renderDetail(params.data);
      });
      window.addEventListener('resize', () => chart.resize());
      fillFilters();
      draw();
    }

      const styles = `

        </style>`;
      root.innerHTML = styles + `
        <div class="stats">
          <div class="stat"><div class="k">年份</div><div class="v" id="mc-year-v">${years[0]}</div></div>
          <div class="stat"><div class="k">交易日数</div><div class="v" id="mc-days-v">0</div></div>
          <div class="stat"><div class="k">活跃行业</div><div class="v" id="mc-industry-v">0</div></div>
        </div>
        <div class="cal-toolbar">
          <select id="mc-year">${years.map(y => `<option value="${y}">${y}</option>`).join('')}</select>
        </div>
        <div class="cal-wrap" id="mc-wrap"></div>
        <div class="legend" id="mc-legend"></div>`;

      const palette = ['#dbeafe','#bfdbfe','#fde68a','#fecaca','#bbf7d0','#ddd6fe','#fecdd3','#a7f3d0','#fdba74','#c7d2fe','#f5d0fe','#bae6fd','#e9d5ff','#fef3c7','#cbd5e1','#99f6e4','#fca5a5','#86efac','#fcd34d','#93c5fd'];
      function buildMonthCard(year, month, lookup, colorMap) {
        const first = new Date(year, month - 1, 1);
        const last = new Date(year, month, 0).getDate();
        const startWeekday = (first.getDay() + 6) % 7;
        const weekNames = ['一','二','三','四','五','六','日'];
        const items = [];
        for (let i = 0; i < startWeekday; i++) items.push('<div class="cal-day empty"></div>');
        for (let day = 1; day <= last; day++) {
          const ds = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
          const item = lookup[ds];
          if (!item) {
            items.push(`<div class="cal-day empty"><div class="d">${day}</div><div class="l">休市</div></div>`);
            continue;
          }
          const bg = colorMap[item.top_industry] || '#f3f4f6';
          items.push(`<div class="cal-day" style="background:${bg};"><div class="d">${day}</div><div class="l">${escapeHtml(item.top_industry)}</div></div>`);
        }
        return `<div class="cal-card"><div class="cal-title">${year}年${month}月</div><div class="cal-grid">${weekNames.map(x => `<div class="cal-head">${x}</div>`).join('')}${items.join('')}</div></div>`;
      }
      function draw() {
        const year = document.getElementById('mc-year').value;
        const rows = payload.years[year] || [];
        const lookup = {};
        const industries = [];
        rows.forEach(r => { lookup[r.date] = r; if (!industries.includes(r.top_industry)) industries.push(r.top_industry); });
        const colorMap = {};
        industries.forEach((name, idx) => { colorMap[name] = palette[idx % palette.length]; });
        document.getElementById('mc-year-v').textContent = year;
        document.getElementById('mc-days-v').textContent = rows.length;
        document.getElementById('mc-industry-v').textContent = industries.length;
        document.getElementById('mc-wrap').innerHTML = Array.from({length:12}, (_, i) => buildMonthCard(Number(year), i + 1, lookup, colorMap)).join('');
        document.getElementById('mc-legend').innerHTML = industries.map(name => `<div class="legend-item"><span class="legend-dot" style="background:${colorMap[name]}"></span>${escapeHtml(name)}</div>`).join('');
      }
      document.getElementById('mc-year').addEventListener('change', draw);
      draw();
    }

        const grouped = new Map();
        range.forEach(date => (recordsByDate[date] || []).forEach(row => {
          const item = grouped.get(row.industry) || { industry: row.industry, stock_count: 0, total_change_pct: 0, weighted_change: 0, days: 0 };
          item.stock_count += Number(row.stock_count || 0);
          item.total_change_pct += Number(row.total_change_pct || 0);
          item.weighted_change += Number(row.avg_change_pct || 0) * Number(row.stock_count || 0);
          item.days += 1;
          grouped.set(row.industry, item);
        }));
        return Array.from(grouped.values()).map(x => ({
          industry: x.industry,
          stock_count: x.days ? Math.round(x.stock_count / x.days) : 0,
          total_change_pct: x.total_change_pct,
          avg_change_pct: x.stock_count ? x.weighted_change / x.stock_count : 0,
        })).sort((a,b) => b.total_change_pct - a.total_change_pct);

        }, true);
      }
      ['mi-start','mi-end'].forEach(id => document.getElementById(id).addEventListener('change', draw));
      draw();
    }

      function renderDataArea() {

        const filteredNews = currentNews.filter(n => {

      // 服务端采集

        try {
          const startDate = document.getElementById('sa-start-date').value;
          const endDate = document.getElementById('sa-end-date').value;

            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ codes: [currentStockCode], limit: 30 })
          });
          const result = await resp.json();
          if (result.success) {
            alert(`采集完成，新增 ${result.result?.inserted || 0} 条新闻`);
            window.location.reload();
          } else {
            alert('采集失败: ' + (result.error || '未知错误'));

          alert('采集失败: ' + err.message);
        } finally {
          isCollecting = false;
          btn.disabled = false;
          btn.textContent = '服务端采集';
        }

        const selectedModelName = document.getElementById('sa-model-select').value;
        const model = models.find(m => m.name === selectedModelName);
        if (!model) { alert('请先配置大模型'); return; }

        const startDate = document.getElementById('sa-start-date').value;
        const endDate = document.getElementById('sa-end-date').value;
        const userPrompt = document.getElementById('sa-analyze-prompt').value.trim() || analyzePrompt;

        isAnalyzing = true;
        const btn = document.getElementById('sa-analyze-btn');
        btn.disabled = true;
        btn.textContent = '分析中...';

        const resultContent = document.getElementById('sa-result-content');
        resultContent.className = 'sa-result rendered';
        resultContent.innerHTML = '<div class="sa-loading"><div class="sa-loading-dot"></div><div class="sa-loading-dot"></div><div class="sa-loading-dot"></div><span>正在分析...</span></div>';

        // 构建数据上下文
        const filteredNews = currentNews.filter(n => {
          const at = n.published_at || '';
          if (startDate && at < startDate) return false;
          if (endDate && at > endDate + ' 23:59:59') return false;
          return true;
        });
        const dt = (currentContext.dragon_tiger || []).filter(d => {
          if (startDate && d.date < startDate) return false;
          if (endDate && d.date > endDate) return false;
          return true;
        });

        let dataContext = '';
        if (filteredNews.length > 0) {
          dataContext += '## 新闻数据\n';
          filteredNews.slice(0, 15).forEach((n, i) => {
            dataContext += `${i+1}. [${n.sentiment || '中性'}] ${n.title} (${n.published_at || ''})\n`;
          });
        }
        if (dt.length > 0) {
          dataContext += '\n## 龙虎榜数据\n';
          dt.forEach(d => {
            dataContext += `日期: ${d.date}\n`;
            (d.operations || []).slice(0, 5).forEach(op => {
              dataContext += `  ${(op.direction || '')} ${(op.seatName || op.seat_name || '')} ${op.amount != null ? fmtAmount(op.amount) : ''}\n`;
            });
          });
        }

        const fullPrompt = userPrompt
          .replace(/\{stock_code\}/g, currentStockCode)
          .replace(/\{stock_name\}/g, currentStockName)
          .replace(/\{start_date\}/g, startDate)
          .replace(/\{end_date\}/g, endDate)
          .replace(/\{news_data\}/g, filteredNews.length > 0 ? filteredNews.slice(0, 15).map((n, i) => `${i+1}. [${n.sentiment || '中性'}] ${n.title} (${n.published_at || ''})`).join('\n') : '暂无')
          .replace(/\{dragon_tiger_data\}/g, dt.length > 0 ? dt.map(d => `${d.date}: ${(d.operations || []).slice(0, 3).map(op => `${op.direction} ${op.seatName || op.seat_name} ${op.amount != null ? fmtAmount(op.amount) : ''}`).join(', ')}`).join('\n') : '暂无')
          .replace(/\{stock_kline_data\}/g, '暂无');

        try {
          currentRawText = '';
          document.getElementById('sa-result-tabs').style.display = 'flex';
          
          const apiUrl = model.baseUrl + '/chat/completions';
          const resp = await fetch(apiUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + model.apiKey,
            },
            body: JSON.stringify({
              model: model.model,
              messages: [
                { role: 'system', content: '你是一位专业的 A 股市场分析师。请基于提供的数据，给出专业、客观的分析。回答使用中文，使用 Markdown 格式输出。' },
                { role: 'user', content: fullPrompt + (dataContext ? '\n\n## 已有数据\n' + dataContext : '') }
              ],
              stream: true,
              temperature: 0.7,
              max_tokens: 2000,
            }),
          });

          if (!resp.ok) {
            const errText = await resp.text();
            throw new Error('API 请求失败 (' + resp.status + '): ' + errText.substring(0, 200));
          }

          const reader = resp.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            for (const line of lines) {
              const trimmed = line.trim();
              if (!trimmed || !trimmed.startsWith('data:')) continue;
              const d = trimmed.slice(5).trim();
              if (d === '[DONE]') continue;
              try {
                const json = JSON.parse(d);
                const delta = json.choices && json.choices[0] && json.choices[0].delta;
                if (delta && delta.content) {
                  currentRawText += delta.content;
                  const activeMode = document.getElementById('sa-result-tabs').querySelector('button.active')?.dataset.mode || 'rendered';
                  if (activeMode === 'rendered') {
                    resultContent.innerHTML = renderMarkdown(currentRawText);
                  } else {
                    resultContent.textContent = currentRawText;
                  }
                  resultContent.scrollTop = resultContent.scrollHeight;
                }
              } catch (e) { /* skip */ }
            }
          }
        } catch (err) {
          resultContent.innerHTML = `<div style="color:var(--danger);">分析失败: ${escapeHtml(err.message)}</div>`;
        } finally {
          isAnalyzing = false;
          btn.disabled = false;
          btn.textContent = '开始分析';
        }
      }

      // 调用大模型
      async function callLLM(model, prompt, maxTokens = 2000) {
        const apiUrl = model.baseUrl + '/chat/completions';
        const resp = await fetch(apiUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + model.apiKey,
          },
          body: JSON.stringify({
            model: model.model,
            messages: [
              { role: 'system', content: '你是一位专业的 A 股市场分析师和数据采集助手。请根据要求搜索并整理数据，或进行分析。回答使用中文。' },
              { role: 'user', content: prompt }
            ],
            stream: false,
            temperature: 0.7,
            max_tokens: maxTokens,
          }),
        });

        if (!resp.ok) {
          const errText = await resp.text();
          throw new Error('API 请求失败 (' + resp.status + '): ' + errText.substring(0, 200));
        }

        const result = await resp.json();
        return result.choices?.[0]?.message?.content || '';
      }

      // Markdown 渲染
      function renderMarkdown(text) {
        let html = escapeHtml(text);
        html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/```[\s\S]*?```/g, function(match) {
          const code = match.slice(3, -3).replace(/^[a-z]*\n/, '');
          return '<pre><code>' + code + '</code></pre>';
        });
        html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
        html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
        html = html.replace(/^\* (.+)$/gm, '<li>$1</li>');
        html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
        html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
        html = html.replace(/^---$/gm, '<hr>');
        html = html.replace(/\n\n/g, '</p><p>');
        html = '<p>' + html + '</p>';
        html = html.replace(/<p><\/p>/g, '');
        html = html.replace(/<p>(<h[1-3]>)/g, '$1');
        html = html.replace(/(<\/h[1-3]>)<\/p>/g, '$1');
        html = html.replace(/<p>(<ul>)/g, '$1');
        html = html.replace(/(<\/ul>)<\/p>/g, '$1');
        html = html.replace(/<p>(<blockquote>)/g, '$1');
        html = html.replace(/(<\/blockquote>)<\/p>/g, '$1');
        html = html.replace(/<p>(<hr>)/g, '$1');
        html = html.replace(/<p>(<pre>)/g, '$1');
        html = html.replace(/(<\/pre>)<\/p>/g, '$1');
        return html;
      }

      renderPage();
    }

      function loadStockNews(code) {
        currentStockCode = code;
        currentNews = stockNews[code] || [];

        // 更新输入框显示
        const stockInput = document.getElementById('sn-stock-input');
        if (stockInput) {
          stockInput.value = `${code} ${stockNameMap[code] || ''}`;
        }

        // 更新左侧选中状态
        document.querySelectorAll('.sn-stock-item').forEach(item => {
          item.style.background = item.dataset.code === code ? '#f0f7f4' : '';
          item.style.fontWeight = item.dataset.code === code ? '600' : '';
        });

        // 更新标题
        const displayName = stockNameMap[code] ? `${code} ${stockNameMap[code]}` : code;
        const titleEl = document.getElementById('sn-news-title');
        if (titleEl) {
          titleEl.innerHTML = `${escapeHtml(displayName)} 新闻 <span style="font-size:12px;color:var(--muted);">(${currentNews.length}条)</span>`;
        }

        renderNewsList();
      }

      function renderNewsList() {
        const news = currentNews;
        const newsListEl = document.getElementById('sn-news-list');
        if (!newsListEl) return;

        if (news.length === 0) {
          newsListEl.innerHTML = '<div class="sn-empty">暂无该股票的新闻数据</div>';
          return;
        }

        function drawNewsList() {
          const sentiment = document.getElementById('sn-filter-sentiment').value;
          const startDate = document.getElementById('sn-filter-start').value;
          const endDate = document.getElementById('sn-filter-end').value;

          let filtered = [...news];

          if (sentiment) {
            filtered = filtered.filter(n => n.sentiment === sentiment);
          }
          if (startDate) {
            filtered = filtered.filter(n => (n.published_at || '') >= startDate);
          }
          if (endDate) {
            filtered = filtered.filter(n => (n.published_at || '') <= endDate + ' 23:59:59');
          }

          newsListEl.innerHTML = filtered.length > 0
            ? filtered.map(n => renderNewsItem(n)).join('')
            : '<div class="sn-empty">没有符合条件的新闻</div>';
        }

        drawNewsList();
      }

      async function handleAnalyze(code, news) {
        const baseUrl = (document.getElementById('sn-llm-baseurl')?.value || localStorage.getItem('sn_llm_base_url') || '').replace(/\/+$/, '');
        const apiKey = document.getElementById('sn-llm-key')?.value || localStorage.getItem('sn_llm_key') || '';
        const model = document.getElementById('sn-llm-model')?.value || localStorage.getItem('sn_llm_model') || '';
        const customPrompt = document.getElementById('sn-llm-prompt')?.value || localStorage.getItem('sn_llm_prompt') || '';

        if (!baseUrl || !apiKey || !model) {
          alert('请先配置大模型的 Base URL、API Key 和模型名称');
          return;
        }

        const analyzeBtn = document.getElementById('sn-analyze-btn');
        const newsListEl = document.getElementById('sn-news-list');
        const toolbarEl = document.getElementById('sn-toolbar');

        isAnalyzing = true;
        analyzeBtn.disabled = true;
        analyzeBtn.textContent = '搜索中...';
        // 隐藏筛选栏，显示加载状态
        toolbarEl.style.display = 'none';
        newsListEl.innerHTML = `
          <div class="sn-loading">
            <div style="display:flex;gap:6px;">
              <div class="sn-loading-dot"></div>
              <div class="sn-loading-dot"></div>
              <div class="sn-loading-dot"></div>
            </div>
            <div class="sn-loading-text">AI 正在搜索分析 ${escapeHtml(stockNameMap[code] || code)} 的新闻...</div>
          </div>`;

        // 构建新闻摘要
        const displayName = stockNameMap[code] ? `${code} ${stockNameMap[code]}` : code;
        const newsSummary = news.slice(0, 20).map((n, i) => 
          `${i+1}. [${n.sentiment || '中性'}] ${n.title} (${n.published_at || ''})`
        ).join('\n');

        const prompt = customPrompt
          ? `${customPrompt}

股票: ${displayName}

新闻列表：
${newsSummary}`
          : `请分析以下 ${displayName} 的近期新闻，给出：\n1. 整体情绪倾向（利好/利空/中性）\n2. 关键事件摘要\n3. 短期走势展望\n4. 风险提示\n\n新闻列表：\n${newsSummary}`;

        try {
            const apiUrl = baseUrl + '/chat/completions';
            const body = {
              model: model,
              messages: [
                { role: 'system', content: '你是一位专业的 A 股市场分析师。请基于提供的新闻信息，给出专业、客观的分析。回答使用中文，使用 Markdown 格式输出。' },
                { role: 'user', content: prompt }
              ],
              stream: true,
              temperature: 0.7,
              max_tokens: 1500,
            };

            const resp = await fetch(apiUrl, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + apiKey,
              },
              body: JSON.stringify(body),
            });

            if (!resp.ok) {
              const errText = await resp.text();
              throw new Error('API 请求失败 (' + resp.status + '): ' + errText.substring(0, 200));
            }

            // 保持loading，只更新文字提示正在输出
            const loadingText = newsListEl.querySelector('.sn-loading-text');
            if (loadingText) loadingText.textContent = 'AI 正在输出分析结果...';

            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let fullText = '';
            let isFirstChunk = true;

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              buffer += decoder.decode(value, { stream: true });
              const lines = buffer.split('\n');
              buffer = lines.pop() || '';
              for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed || !trimmed.startsWith('data:')) continue;
                const data = trimmed.slice(5).trim();
                if (data === '[DONE]') continue;
                try {
                  const json = JSON.parse(data);
                  const delta = json.choices && json.choices[0] && json.choices[0].delta;
                  if (delta && delta.content) {
                    // 第一个chunk时才替换loading为结果区域
                    if (isFirstChunk) {
                      isFirstChunk = false;
                      newsListEl.innerHTML = '<div class="sn-analysis-result" id="sn-analysis-stream"></div>';
                    }
                    fullText += delta.content;
                    const streamEl = document.getElementById('sn-analysis-stream');
                    if (streamEl) {
                      // 简单的 markdown 渲染
                      let html = escapeHtml(fullText);
                      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
                      html = html.replace(/\n/g, '<br>');
                      streamEl.innerHTML = html;
                      streamEl.scrollTop = streamEl.scrollHeight;
                    }
                  }
                } catch (e) { /* skip malformed chunks */ }
              }
            }

            // 保存分析结果到 localStorage 和当前新闻列表
            const aiNewsItem = {
              title: `AI 分析: ${stockNameMap[code] || code}`,
              content: fullText,
              published_at: new Date().toISOString().slice(0, 19).replace('T', ' '),
              source: 'AI 搜索',
              sentiment: '中性',
              event_type: 'AI分析',
              isAI: true,
            };
            // 添加到当前新闻列表
            currentNews = [aiNewsItem, ...currentNews];
            
            // 更新标题显示新的数量
            const titleEl = document.getElementById('sn-news-title');
            if (titleEl) {
              const displayName = stockNameMap[code] ? `${code} ${stockNameMap[code]}` : code;
              titleEl.innerHTML = `${escapeHtml(displayName)} 新闻 <span style="font-size:12px;color:var(--muted);">(${currentNews.length}条)</span>`;
            }
            
            // 保存到 localStorage
            try {
              const savedAnalyses = JSON.parse(localStorage.getItem('sn_analyses') || '{}');
              savedAnalyses[code] = {
                analysis: fullText,
                newsCount: news.length,
                newsSample: news.slice(0, 10).map(n => ({
                  title: n.title,
                  sentiment: n.sentiment,
                  published_at: n.published_at,
                })),
                analyzedAt: new Date().toISOString(),
                stockName: stockNameMap[code] || '',
              };
              localStorage.setItem('sn_analyses', JSON.stringify(savedAnalyses));
            } catch (e) {
              console.error('保存分析结果失败:', e);
            }
            // 添加返回按钮
            const streamEl = document.getElementById('sn-analysis-stream');
            if (streamEl) {
              streamEl.innerHTML += '<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--line);"><button id="sn-back-to-news" style="padding:8px 16px;font-size:13px;border:1px solid var(--line);background:#fff;border-radius:10px;cursor:pointer;">返回新闻列表</button></div>';
            }
            document.getElementById('sn-back-to-news')?.addEventListener('click', () => {
              renderNewsList();
              toolbarEl.style.display = '';
            });
        } catch (err) {
          newsListEl.innerHTML = `<div class="sn-analysis-result" style="color:var(--danger);">分析失败: ${escapeHtml(err.message)}<div style="margin-top:16px;"><button id="sn-back-to-news" style="padding:8px 16px;font-size:13px;border:1px solid var(--line);background:#fff;border-radius:10px;cursor:pointer;">返回新闻列表</button></div></div>`;
          document.getElementById('sn-back-to-news').addEventListener('click', () => {
            renderNewsList();
            toolbarEl.style.display = '';
          });
        } finally {
          isAnalyzing = false;
          analyzeBtn.disabled = false;
          analyzeBtn.textContent = 'AI 搜索';
        }
      }

      function renderNewsItem(n) {
        const sentimentClass = n.sentiment === '利好' ? 'positive' : n.sentiment === '利空' ? 'negative' : 'neutral';
        const titleHtml = n.url
          ? `<a href="${escapeHtml(n.url)}" target="_blank" rel="noopener">${escapeHtml(n.title)}</a>`
          : escapeHtml(n.title);
        const sourceTag = n.isAI
          ? '<span class="sn-source-tag sn-source-ai">AI 搜索</span>'
          : '<span class="sn-source-tag sn-source-local">本地采集</span>';
        const meta = [sourceTag];
        if (n.published_at) meta.push(escapeHtml(n.published_at));
        if (n.source && !n.isAI) meta.push(escapeHtml(n.source));
        if (n.event_type && n.event_type !== '其他' && n.event_type !== 'AI分析') meta.push(escapeHtml(n.event_type));
        if (n.sentiment) meta.push(`<span class="sn-sentiment-tag ${sentimentClass}">${escapeHtml(n.sentiment)}</span>`);
        const content = n.content || n.summary || '';
        const needExpand = content.length > 120;
        return `<div class="sn-news-item${n.isAI ? ' sn-news-ai' : ''}">
          <div class="sn-news-title">${titleHtml}</div>
          <div class="sn-news-meta">${meta.join('')}</div>
          ${content ? `<div class="sn-news-content">${escapeHtml(content)}</div>` : ''}
          ${needExpand ? '<button class="sn-expand-btn">展开全文</button>' : ''}
        </div>`;
      }

      async function handleCrawl() {
        const code = document.getElementById('sn-stock-input').value.trim();
        if (!code) {
          alert('请输入股票代码');
          return;
        }

        const startDate = document.getElementById('sn-start-date').value;
        const endDate = document.getElementById('sn-end-date').value;
        const statusEl = document.getElementById('sn-crawl-status');
        const btn = document.getElementById('sn-crawl-btn');

        isCrawling = true;
        btn.disabled = true;
        btn.textContent = '采集中...';
        statusEl.innerHTML = '<div class="sn-loading"><div class="sn-loading-dot"></div><div class="sn-loading-dot"></div><div class="sn-loading-dot"></div><span>正在采集新闻...</span></div>';

        try {
          const response = await fetch(`${apiBase}/api/news/sync`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ codes: [code], limit: 30 })
          });

          const result = await response.json();

          if (result.success) {
            const inserted = result.result?.inserted || 0;
            statusEl.innerHTML = `<span style="color:var(--success);">采集完成，新增 ${inserted} 条新闻</span>`;

            // 重新加载页面数据
            setTimeout(() => {
              window.location.reload();
            }, 1500);
          } else {
            statusEl.innerHTML = `<span style="color:var(--danger);">采集失败: ${escapeHtml(result.error || '未知错误')}</span>`;
          }
        } catch (err) {
          statusEl.innerHTML = `<span style="color:var(--danger);">请求失败: ${escapeHtml(err.message)}</span>`;
        } finally {
          isCrawling = false;
          btn.disabled = false;
          btn.textContent = '采集新闻';
        }
      }

      renderPage();
    }

    /* ==================== AI 分析 ==================== */
