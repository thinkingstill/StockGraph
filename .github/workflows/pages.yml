name: Build and Deploy Pages

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: 可选，指定同步日期（YYYYMMDD 或 YYYY-MM-DD）
        required: false
        type: string
      market_overview_year:
        description: 可选，额外生成年度行业强弱榜单
        required: false
        type: string
      sync_news:
        description: 是否同步新闻
        required: false
        type: boolean
        default: false
      build_graphs:
        description: 是否构建图快照
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
  schedule:
    - cron: '0 9 * * 1-5'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHON_BIN: python
      TARGET_DATE: ${{ inputs.target_date || '' }}
      MARKET_OVERVIEW_YEAR: ${{ inputs.market_overview_year || '' }}
      SYNC_NEWS: ${{ inputs.sync_news && '1' || '0' }}
      BUILD_GRAPHS: ${{ inputs.build_graphs && '1' || '0' }}
      SYNC_MARKET_OVERVIEW: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build site outputs
        run: |
          bash run_daily_sync.sh
          python scripts/build_pages_site.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: outputs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4