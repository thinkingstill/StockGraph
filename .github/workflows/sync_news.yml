name: Sync Stock News

on:
  schedule:
    # 每6小时运行一次（UTC时间 0:00, 6:00, 12:00, 18:00）
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      stock_codes:
        description: '股票代码，逗号分隔（留空使用默认热门股票）'
        required: false
        type: string
      limit:
        description: '每只股票采集新闻数量'
        required: false
        type: string
        default: '30'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  sync-news:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.sync.outputs.has_changes }}
    env:
      PYTHON_BIN: python
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Sync news
        id: sync
        shell: bash
        run: |
          set -euo pipefail
          
          # 同步所有股票代码列表
          echo "Syncing all stock codes..."
          python scripts/sync_stock_codes.py || {
            echo "Stock codes sync failed, but continuing..."
          }
          
          # 默认热门股票列表（可根据需要调整）
          DEFAULT_CODES="000001,000858,600519,000333,002475,300750,601318,600036,000651,002594,300059,601899,600900,000725,002415,300274,300308,002371,603259,002714"
          
          STOCK_CODES="${{ inputs.stock_codes || '' }}"
          if [[ -z "$STOCK_CODES" ]]; then
            STOCK_CODES="$DEFAULT_CODES"
          fi
          
          LIMIT="${{ inputs.limit || '30' }}"
          
          echo "Syncing news for stocks: $STOCK_CODES"
          echo "Limit per stock: $LIMIT"
          
          # 运行新闻同步脚本
          python scripts/sync_news.py --stock-codes "$STOCK_CODES" --stock-limit "$LIMIT" || {
            echo "News sync failed, but continuing..."
          }
          
          # 重新构建前端数据
          python scripts/build_unified_app.py || {
            echo "Build unified app failed, but continuing..."
          }
          
          # 检查是否有变更
          if git diff --quiet outputs/app/data/ai_analysis.json outputs/app/data/stock_news.json data/reference/all_stock_codes.json 2>/dev/null; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.sync.outputs.has_changes == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 添加更新的数据文件
          git add -f outputs/app/data/ || true
          git add -f data/shared_state/news.db || true
          git add -f data/reference/all_stock_codes.json || true
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(news): sync stock news $(date -u '+%Y-%m-%d %H:%M')"
            git push
          fi

      - name: Upload Pages artifact
        if: steps.sync.outputs.has_changes == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: outputs

  deploy:
    if: github.event_name != 'push' && needs.sync-news.outputs.has_changes == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: sync-news
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
